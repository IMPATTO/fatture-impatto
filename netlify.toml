[build]
  publish = "."
  command = "npm install"

[functions]
  directory = "netlify/functions"
  included_files = ["stati.csv"]

[functions."sync-beds24-links"]
  schedule = "0 * * * *"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
