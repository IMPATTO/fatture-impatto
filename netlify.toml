[build]
  publish = "."
  command = "npm install"

[build.environment]
  SECRETS_SCAN_OMIT_KEYS = "SUPABASE_URL,SUPABASE_ANON_KEY,SUPABASE_SERVICE_KEY,SUPABASE_SERVICE_ROLE_KEY,EMAIL_FROM,INTERNAL_API_KEY"

[functions]
  directory = "netlify/functions"
  included_files = ["stati.csv"]

[functions."sync-beds24-links"]
  schedule = "0 * * * *"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"
