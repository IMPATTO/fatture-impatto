        }
      }

      await loadAll();
      renderConfig();
      toast('Collegamento salvato','ok');
      btn.disabled = false; btn.textContent = 'Salva';
    });
  });
}



// ── Autocomplete Engine ──
const AC = {
  comuni: null,   // [{codice, nome, prov}]
  stati: null,    // [{codice, nome}]

  async loadComuni() {
    if (AC.comuni) return;
    AC._comuniError = false;
    try {
      const res = await fetch('/comuni.csv');
      if (!res.ok) { AC._comuniStatus = res.status; throw new Error(`HTTP ${res.status} su /comuni.csv`); }
      const txt = await res.text();
      AC.comuni = [];
      const lines = txt.replace(/\r/g,'').split('\n').slice(1);
      for (const line of lines) {
        if (!line.trim()) continue;
        // Parsing robusto: prende i primi 4 campi separati da virgola
        // I nomi non contengono virgole nei CSV AlloggiatiWeb
        const parts = line.split(',');
        if (parts.length < 2) continue;
        const codice = parts[0].trim();
        const desc   = parts[1].trim();
        const prov   = (parts[2]||'').trim();
        const fine   = (parts[3]||'').trim();
        if (!codice || !desc) continue;
        if (fine) continue; // comune soppresso
        AC.comuni.push({ codice, nome: desc, prov });
      }
    } catch(e) { console.warn('comuni.csv non caricato', e); AC.comuni = []; AC._comuniError = true; AC._comuniStatus = AC._comuniStatus || '?'; }
  },

  async loadStati() {
    if (AC.stati) return;
    AC._statiError = false;
    try {
      const res = await fetch('/stati.csv');
      if (!res.ok) { AC._statiStatus = res.status; throw new Error(`HTTP ${res.status} su /stati.csv`); }
      const txt = await res.text();
      AC.stati = [];
      const lines = txt.replace(/\r/g,'').split('\n').slice(1);
      for (const line of lines) {
        if (!line.trim()) continue;
        const parts = line.split(',');
        if (parts.length < 2) continue;
        const codice = parts[0].trim();
        const desc   = parts[1].trim();
        const fine   = (parts[3]||'').trim();
        if (!codice || !desc) continue;
        if (fine) continue;
        AC.stati.push({ codice, nome: desc });
      }
    } catch(e) { console.warn('stati.csv non caricato', e); AC.stati = []; AC._statiError = true; AC._statiStatus = AC._statiStatus || '?'; }
  },

  search(type, query) {
    const q = query.trim().toUpperCase();
    if (q.length < 2) return [];
    const list = type === 'comune' ? AC.comuni : AC.stati;
    if (!list) return [];
    const exact = [], starts = [], contains = [];
    for (const item of list) {
      const n = item.nome.toUpperCase();
      if (n === q) exact.push(item);
      else if (n.startsWith(q)) starts.push(item);
      else if (n.includes(q)) contains.push(item);
    }
    return [...exact, ...starts, ...contains].slice(0, 12);
  },

  resolveSingle(type, query, provinciaHint = '') {
    const normalized = normalizeLookupValue(query);
    if (!normalized) return null;
    const list = type === 'comune' ? AC.comuni : AC.stati;
    if (!list) return null;
    let matches = list.filter(item => normalizeLookupValue(item.nome) === normalized);
    if (type === 'comune' && matches.length > 1 && provinciaHint) {
      const prov = String(provinciaHint || '').trim().toUpperCase().slice(0, 2);
      const narrowed = matches.filter(item => String(item.prov || '').trim().toUpperCase().slice(0, 2) === prov);
      if (narrowed.length) matches = narrowed;
    }
    return matches.length === 1 ? matches[0] : null;
  },

  applySelection(container, input, item, type) {
    const codiceKey = input.dataset.codiceK;
    const label = type === 'comune' ? `${item.nome} (${item.prov})` : normalizeCitizenshipLabel(item.nome);
    input.value = label;
    S.form[input.dataset.k] = label;

    if (codiceKey) {
      S.form[codiceKey] = item.codice;
      const codiceInput = container.querySelector(`[data-k="${codiceKey}"]`);
      if (codiceInput) codiceInput.value = item.codice;
    }

    AC.closeAll();
    validateDrawer();
  },

  // Chiude tutti i dropdown aperti
  closeAll() {
    document.querySelectorAll('.ac-dropdown').forEach(d => d.remove());
  },

  // Attiva autocomplete su tutti i campi data-ac nel drawer
  async init(container) {
    await Promise.all([AC.loadComuni(), AC.loadStati()]);

    // Precarica descrizione stati esistenti (ospiti esteri già salvati)
    if (AC.stati && AC.stati.length) {
      const codiceNascitaInput = container.querySelector('[data-k="stato_nascita_codice"]');
      const descNascitaInput   = container.querySelector('[data-k="_stato_nascita_desc"]');
      if (codiceNascitaInput && descNascitaInput && codiceNascitaInput.value && !descNascitaInput.value) {
        const match = AC.stati.find(s => s.codice === codiceNascitaInput.value.trim());
        if (match) {
          descNascitaInput.value = match.nome;
          S.form._stato_nascita_desc = match.nome;
        }
      }
    }

    container.querySelectorAll('[data-ac]').forEach(input => {
      const type = input.dataset.ac;       // 'comune' | 'stato'
      const getProvinciaHint = () => {
        if (type !== 'comune') return '';
        if (input.dataset.k === 'luogo_nascita') {
          return extractProvinceFromComuneLabel(input.value) || extractProvinceFromComuneLabel(S.selected?.luogo_nascita || '');
        }
        return '';
      };

      input.addEventListener('input', () => {
        AC.closeAll();
        const q = input.value;
        if (q.length < 2) return;
        const exactMatch = AC.resolveSingle(type, q, getProvinciaHint());
        if (exactMatch) {
          AC.applySelection(container, input, exactMatch, type);
          return;
        }
        const results = AC.search(type, q);
        if (!results.length) return;

        const drop = document.createElement('div');
        drop.className = 'ac-dropdown';

        results.forEach((item, idx) => {
          const div = document.createElement('div');
          div.className = 'ac-item' + (idx === 0 ? ' ac-selected' : '');
          div.innerHTML = type === 'comune'
            ? `<span class="ac-item-name">${item.nome}<span class="ac-item-prov">${item.prov}</span></span><span class="ac-item-code">${item.codice}</span>`
            : `<span class="ac-item-name">${item.nome}</span><span class="ac-item-code">${item.codice}</span>`;

          div.addEventListener('mousedown', e => {
            e.preventDefault();
            AC.applySelection(container, input, item, type);
          });
          drop.appendChild(div);
        });

        input.parentElement.appendChild(drop);
      });

      input.addEventListener('blur', () => {
        const exactMatch = AC.resolveSingle(type, input.value, getProvinciaHint());
        if (exactMatch) AC.applySelection(container, input, exactMatch, type);
        setTimeout(AC.closeAll, 150);
      });

      input.addEventListener('keydown', e => {
        const drop = input.parentElement.querySelector('.ac-dropdown');
        if (!drop) return;
        const items = drop.querySelectorAll('.ac-item');
        let sel = drop.querySelector('.ac-selected');
        let idx = [...items].indexOf(sel);
        if (e.key === 'ArrowDown') {
          e.preventDefault();
          if (sel) sel.classList.remove('ac-selected');
          items[(idx + 1) % items.length]?.classList.add('ac-selected');
        } else if (e.key === 'ArrowUp') {
          e.preventDefault();
          if (sel) sel.classList.remove('ac-selected');
          items[(idx - 1 + items.length) % items.length]?.classList.add('ac-selected');
        } else if (e.key === 'Enter') {
          e.preventDefault();
          drop.querySelector('.ac-selected')?.dispatchEvent(new MouseEvent('mousedown'));
        } else if (e.key === 'Escape') {
          AC.closeAll();
        }
      });

      const preloadMatch = AC.resolveSingle(type, input.value, getProvinciaHint());
      if (preloadMatch) AC.applySelection(container, input, preloadMatch, type);
    });
  }
};

function normalizeCitizenshipLabel(value) {
  const normalized = normalizeLookupValue(value);
  if (!normalized) return '';
  if (['italia','italy','italiana','italiano','cittadinanza italiana','nazionalita italiana','nazionalita: italia'].includes(normalized)) return 'Italia';
  return String(value || '').trim();
}

// ── Init ──
(async()=>{
  try {
    if (!window.sb) throw new Error('Supabase client non caricato — controlla /js/supabase-client.js');
    const res = await sb.auth.getSession();
    if (!res?.data?.session) console.warn('[init] nessuna sessione attiva');
    const session = res?.data?.session;
    S.session = session;
    if (session) { await loadAll(); renderDashboard(); }
    else renderLogin();
  } catch(err) {
    console.error('[init] ERRORE:', err);
    document.getElementById('app').innerHTML =
      `<div style="padding:40px;font-family:monospace;color:var(--red)">
        <strong>Errore inizializzazione</strong><br><br>${err.message}
        <br><br><small>Apri la console per i dettagli.</small>
       </div>`;
  }
})();

sb.auth.onAuthStateChange(async (_, session) => {
  try {
    if (!session && S.session) {
      S.session = null;
      S.rows=[]; S.selected=null; S.form={};
      renderLogin();
    }
    if (session && !S.session) {
      S.session = session;
      await loadAll();
      renderDashboard();
    }
  } catch(err) {
    console.error('[authStateChange] ERRORE:', err);
  }
});
</script>
